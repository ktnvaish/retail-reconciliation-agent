name: Deploy to Azure Container Apps

# Continuous deployment: on every push to main that changes app code (or this
# workflow), build the image in Azure Container Registry and roll it out to the
# Container App with zero-downtime revision switching. Mirrors the CI gates
# (lint/type/test live in ci.yml) — this workflow only deploys.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "data/samples/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # allow manual runs from the Actions tab

env:
  ACR_NAME: cac3c78198c2acr
  IMAGE_NAME: reconcileflow
  RG: reconcileflow-rg
  APP_NAME: reconcileflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag (short git SHA)
        id: tag
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in the cloud (ACR Tasks — no local Docker needed)
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:${{ steps.tag.outputs.tag }} \
            --image $IMAGE_NAME:latest \
            --file Dockerfile \
            .

      - name: Deploy the new image to the Container App
        run: |
          az containerapp update \
            --name $APP_NAME \
            --resource-group $RG \
            --image ${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ steps.tag.outputs.tag }} \
            --revision-suffix gh-${{ steps.tag.outputs.tag }} \
            --output table

      - name: Route 100% traffic to the new revision
        run: |
          NEW_REV="${APP_NAME}--gh-${{ steps.tag.outputs.tag }}"
          sleep 30  # let the new revision provision
          az containerapp revision set-mode -n $APP_NAME -g $RG --mode Multiple --output none
          az containerapp ingress traffic set \
            --name $APP_NAME \
            --resource-group $RG \
            --revision-weight "$NEW_REV=100" \
            --output table

      - name: Deactivate previous revisions (keep only the new one)
        run: |
          NEW_REV="${APP_NAME}--gh-${{ steps.tag.outputs.tag }}"
          OLD_REVS=$(az containerapp revision list -n $APP_NAME -g $RG \
            --query "[?properties.active && name != '$NEW_REV'].name" -o tsv)
          for rev in $OLD_REVS; do
            echo "Deactivating $rev"
            az containerapp revision deactivate -n $APP_NAME -g $RG --revision "$rev" --output none || true
          done

      - name: Smoke test /healthz
        run: |
          FQDN=$(az containerapp show -n $APP_NAME -g $RG \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App URL: https://$FQDN"
          for i in 1 2 3 4 5; do
            if curl -fsS "https://$FQDN/healthz" | grep -q '"status":"ok"'; then
              echo "Health OK"; exit 0
            fi
            echo "attempt $i: waiting 15s..."
            sleep 15
          done
          echo "Health check failed"; exit 1
